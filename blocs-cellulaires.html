<!doctype html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Blocs cellulaires | Ets Braconnier</title>
    <meta name="description" content="Blocs cellulaires : blocs à coller, blocs assise hydro, colle et linteaux." />
    <meta name="robots" content="index,follow" />

    <link rel="stylesheet" href="style.css">

    <style>
        .products {
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-width: 0;
        }

        .section {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: #fff;
            overflow: hidden;
        }

        .section .label {
            padding: 10px 12px;
            border-bottom: 1px solid var(--line);
            color: var(--muted);
            font-weight: 700;
            font-family: Verdana, Geneva, sans-serif;
        }

        .cat-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            padding: 14px;
        }

        @media (max-width:900px) {
            .cat-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width:560px) {
            .cat-grid {
                grid-template-columns: 1fr;
            }
        }

        .cat-card {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            overflow: hidden;
            background: #fff;
            display: flex;
            flex-direction: column;
            min-height: 220px;
            text-decoration: none;
        }

        .cat-card:hover {
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }

        .page-blocs-cellulaires .cat-card img {
            width: 100%;
            height: 170px;
            object-fit: contain;
            object-position: center;
            background: #f7f7f7;
            display: block;
            padding: 8px;
        }

        .cat-card:hover img {
            transform: scale(1.03);
        }

        .cat-card .title {
            padding: 10px 12px;
            text-align: center;
            color: var(--muted);
            font-family: "Times New Roman", Times, serif;
            font-style: italic;
            font-weight: bold;
            font-size: 18px;
            border-top: 1px solid var(--line);
        }
    </style>
</head>

<body class="page-blocs-cellulaires">

    <div class="page-scale">

        <header>

            <div class="wrap topbar">
                <div class="brand">
                    <div class="logo">
                        <img id="logoMain" alt="Ets Braconnier" />
                        <small>Matériaux de construction – articles professionnels et de bricolage</small>
                    </div>
                </div>

                <div class="header-right">
                    <div class="quicklinks">
                        <a href="avis.html">Votre avis</a>
                        <a href="https://drive.google.com/file/d/1N9CdKtCcbHPmVZXm3oCqrAfOavRANNqF/preview">RGPD</a>
                    </div>
                </div>
            </div>

            <div class="hero-layout">

                <nav class="main-nav">
                    <button class="menu-toggle">☰ Menu</button>

                    <ul class="menu">
                        <li><a href="index.html">Accueil</a></li>
                        <li><a href="calculs.html">Calculs</a></li>
                        <li><a href="presentation.html">Présentation</a></li>
                        <li><a href="produits.html">Produits</a></li>
                        <li><a href="promotions.html">Promotions</a></li>
                        <li><a href="contact.html">Contacts</a></li>
                    </ul>

                </nav>

                <img id="heroImg" class="hero-img" alt="Magasin – Ets Braconnier" />

                <iframe class="map"
                    src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d5145.2121350771895!2d5.25321!3d49.84985900000001!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47ea808d6bb9e87f%3A0xf00dd4deebbf1048!2sEts%20Braconnier!5e0!3m2!1sfr!2sbe!4v1770570919392!5m2!1sfr!2sbe"
                    loading="lazy" allowfullscreen>
                </iframe>

            </div>
        </header>

        <main>

            <div class="wrap">

                <section class="products">

                    <section class="headline">
                        <h1>Blocs cellulaires</h1>
                    </section>

                    <section class="section">

                        <div class="label"></div>

                        <div class="cat-grid">

                            <a class="cat-card" href="https://drive.google.com/file/d/1I1M09EqwQbq30nc_9Yvapj93TUbpd9n1/preview" target="_blank">
                                <img src="images-site/page-blocs-cellulaires/blocs-a-coller.png" alt="Blocs à coller">
                                <div class="title">Blocs à coller</div>
                            </a>

                            <a class="cat-card" href="https://drive.google.com/file/d/1a_d6keC6raL0yctg6wXKOy1fdnyFVYek/preview" target="_blank">
                                <img src="images-site/page-blocs-cellulaires/blocs-assise-hydro.png"
                                    alt="Blocs assise hydro">
                                <div class="title">Blocs assise hydro</div>
                            </a>

                            <a class="cat-card" href="https://drive.google.com/file/d/17qHiU_4teo5-d4LqhvAEn8Sdzm1Nm45i/preview" target="_blank">
                                <img src="images-site/page-blocs-cellulaires/colle.png"
                                    alt="Colle pour blocs cellulaires">
                                <div class="title">Colle</div>
                            </a>

                            <a class="cat-card" href="https://drive.google.com/file/d/1-kegFAwR1b0dxWQT4Ad5ombOFqXrTZPB/preview" target="_blank">
                                <img src="images-site/page-blocs-cellulaires/linteaux.png"
                                    alt="Linteaux blocs cellulaires">
                                <div class="title">Linteaux</div>
                            </a>

                        </div>

                    </section>

                </section>

            </div>

        </main>

        <footer>
            <div class="wrap">
                <div class="footerbar"></div>
            </div>
        </footer>

        <script>
            const ASSETS = {
                logoMain: "images-site/logo.jpg",
                hero: "images-site/magasin.jpg"
            }

            document.getElementById("logoMain").src = ASSETS.logoMain
            document.getElementById("heroImg").src = ASSETS.hero
        </script>

        <script>
            const toggle = document.querySelector(".menu-toggle")
            const menu = document.querySelector(".menu")

            if (toggle && menu) {
                toggle.addEventListener("click", () => {
                    menu.classList.toggle("open")
                })
            }
        </script>

    </div>

</body>

</html>
