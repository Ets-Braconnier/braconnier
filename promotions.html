<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Promotions – Ets Braconnier</title>
  <meta name="description" content="Découvrez nos promotions en cours." />

  <link rel="stylesheet" href="style.css">

  <!-- même grille que Produits -->
  <style>
    .products {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .section {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      overflow: hidden;
    }

    .section .label {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-weight: 700;
      font-family: Verdana, Geneva, sans-serif;
    }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      padding: 14px;
    }

    .cat-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      min-height: 220px;

      display: flex;
      align-items: center;
      justify-content: center;

      color: #aaa;
      font-style: italic;
    }

    /* ===== Promotions uniquement ===== */
    .page-promotions .promo-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: #fff;
      display: flex;
      flex-direction: column;
      text-align: center;
      min-height: 240px;
    }

    /* image */
    .page-promotions .promo-card img {
      width: 100%;
      height: 170px;
      object-fit: contain;
      background: #f7f7f7;
      padding: 10px;
    }

    /* texte dessous */
    .page-promotions .promo-text {
      padding: 14px;

      font-size: 20px;
      /* plus grand */
      font-weight: 800;
      /* bien gras */
      line-height: 1.3;

      border-top: 1px solid var(--line);
      color: var(--text);
    }


    /* cases vides */
    .page-promotions .promo-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-style: italic;
    }
  </style>
</head>

  <script>
    const ASSETS = {
      logoMain: "images-site/logo.jpg",

  <script>
    const toggle = document.querySelector(".menu-toggle");
    const menu = document.querySelector(".menu");

    if (toggle && menu) {
      toggle.addEventListener("click", () => {
        menu.classList.toggle("open");
        toggle.setAttribute(
          "aria-expanded",
          menu.classList.contains("open") ? "true" : "false"
        );
      });
    }
  </script>

  <script>
    (function refreshPromo(id) {
      const img = document.getElementById(id);
      if (!img) return;

      const base = img.src.split(/[?&]v=/)[0];
      const cacheBuster = Math.floor(Date.now() / (5 * 60 * 1000));
      const sep = base.includes("?") ? "&" : "?";

      img.src = base + sep + "v=" + cacheBuster;
    })("promo1Img");
