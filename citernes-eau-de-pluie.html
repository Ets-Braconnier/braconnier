<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Citernes eau de pluie | Ets Braconnier</title>
  <meta name="description"
    content="Citernes eau de pluie : découvrez nos solutions Eloy, Remacle et Boralit pour la récupération et le stockage de l’eau de pluie." />
  <meta name="robots" content="index,follow" />

  <link rel="stylesheet" href="style.css">

  <style>
    .products {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }

    .section {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      overflow: hidden;
    }

    .section .label {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-weight: 700;
      font-family: Verdana, Geneva, sans-serif;
    }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      padding: 14px;
    }

    @media (max-width: 900px) {
      .cat-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .cat-grid {
        grid-template-columns: 1fr;
      }
    }

    .cat-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: #fff;
      display: flex;
      flex-direction: column;
      min-height: 260px;
      text-decoration: none;
    }

    .cat-card:hover {
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      text-decoration: none;
    }

    .page-citerne-eau-de-pluie .cat-card img {
      width: 100%;
      height: 180px;
      object-fit: contain;
      object-position: center;
      background: #f7f7f7;
      display: block;
      padding: 12px;
      transition: transform .2s ease;
    }

    .cat-card:hover img {
      transform: scale(1.03);
    }

    .cat-card .title {
      padding: 12px 12px 6px;
      text-align: center;
      color: var(--muted);
      font-family: "Times New Roman", Times, serif;
      font-style: italic;
      font-weight: bold;
      font-size: 22px;
      border-top: 1px solid var(--line);
    }

    .cat-card .desc {
      padding: 0 14px 14px;
      text-align: center;
      color: #444;
      line-height: 1.5;
      font-size: 15px;
      flex: 1;
    }

    .intro-box {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 16px;
      color: #444;
      line-height: 1.65;
    }

    .intro-box p {
      margin: 0;
    }
  </style>
</head>

<body class="page-citerne-eau-de-pluie">
  <div class="page-scale">

    <header>
      <div class="wrap topbar">
        <div class="brand">
          <div class="logo">
            <img id="logoMain" alt="Ets Braconnier" />
            <small>Matériaux de construction – articles professionnels et de bricolage</small>
          </div>
        </div>

        <div class="header-right">
          <div class="quicklinks" aria-label="Liens rapides">
            <a href="avis.html">Votre avis</a>
            <a href="https://drive.google.com/file/d/1N9CdKtCcbHPmVZXm3oCqrAfOavRANNqF/preview">RGPD</a>
          </div>
        </div>
      </div>

      <div class="hero-layout">

        <nav class="main-nav" aria-label="Menu principal">
          <button class="menu-toggle" aria-expanded="false">☰ Menu</button>
          <ul class="menu">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="calculs.html">Calculs</a></li>
            <li><a href="presentation.html">Présentation</a></li>
            <li><a href="produits.html">Produits</a></li>
            <li><a href="promotions.html">Promotions</a></li>
            <li><a href="contact.html">Contacts</a></li>
          </ul>
        </nav>

        <img id="heroImg" class="hero-img" alt="Magasin – Ets Braconnier" />

        <iframe class="map"
          src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d5145.2121350771895!2d5.25321!3d49.84985900000001!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47ea808d6bb9e87f%3A0xf00dd4deebbf1048!2sEts%20Braconnier!5e0!3m2!1sfr!2sbe!4v1770570919392!5m2!1sfr!2sbe"
          loading="lazy" allowfullscreen>
        </iframe>

      </div>
    </header>

    <main>
      <div class="wrap">
        <section class="products">

          <section class="headline">
            <h1>Citernes eau de pluie</h1>
          </section>

          <section class="section">
            <div class="label"></div>
            <div class="cat-grid">

              <a class="cat-card" href="https://www.eloywater.com/be/produits/" aria-label="Eloy">
                <img src="images-site/page-citerne-eau-de-pluie/eloy.png" alt="Citerne eau de pluie Eloy">
                <div class="title">Eloy</div>
                <div class="desc">
                  Installation compacte & filtration intégrée
                </div>
              </a>

              <a class="cat-card" href="https://www.remacle.be/fr/produits/eau/citernes-eau-de-pluie" aria-label="Remacle">
                <img src="images-site/page-citerne-eau-de-pluie/remacle.png" alt="Citerne eau de pluie Remacle">
                <div class="title">Remacle</div>
                <div class="desc">
                  Grand volume & solution robuste
                </div>
              </a>

              <a class="cat-card" href="https://www.boralit.be/fr/produits" aria-label="Boralit">
                <img src="images-site/page-citerne-eau-de-pluie/boralit.png" alt="Citerne eau de pluie Boralit">
                <div class="title">Boralit</div>
                <div class="desc">
                  Solution PVC
                </div>
              </a>

            </div>
          </section>

        </section>
      </div>
    </main>

    <footer>
      <div class="wrap">
        <div class="footerbar" aria-hidden="true"></div>
      </div>
    </footer>

    <script>
      const ASSETS = {
        logoMain: "images-site/logo.jpg",
        hero: "images-site/magasin.jpg"
      };
      const logo = document.getElementById("logoMain");
      const hero = document.getElementById("heroImg");
      if (logo) logo.src = ASSETS.logoMain;
      if (hero) hero.src = ASSETS.hero;
    </script>

  </div>

  <script>
    const toggle = document.querySelector(".menu-toggle");
    const menu = document.querySelector(".menu");
    if (toggle && menu) {
      toggle.addEventListener("click", () => {
        menu.classList.toggle("open");
        toggle.setAttribute("aria-expanded", menu.classList.contains("open") ? "true" : "false");
      });
    }
  </script>

  <script src="scripts.js"></script>

</body>

</html>
